<!DOCTYPE html>
<html lang="zh-MM">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDY LAB - မြန်မာအထည်ဆိုင်</title>
</head>
<body style="margin: 0; padding: 20px; font-family: sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 90vh;">

    <!-- 衣服商品卡片容器 -->
    <div style="background: white; max-width: 400px; width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;">
        
        <!-- 衣服图片 -->
        <img src="https://unsplash.com" alt="Clothes" style="width: 100%; height: 350px; object-fit: cover;">
        
        <!-- 商品文字信息区域 -->
        <div style="padding: 20px;">
            <p style="color: #888; font-size: 12px; margin: 0; letter-spacing: 1px;">TRENDY LAB</p>
            <h2 style="font-size: 20px; margin: 8px 0; color: #222;">经典宽松连帽卫衣 (Hoodie)</h2>
            
            <!-- 价格 -->
            <p style="font-size: 22px; color: #ff4d4f; font-weight: bold; margin: 10px 0;">35,000 MMK</p>
            
            <!-- 尺码选择提示 -->
            <div style="margin-bottom: 15px;">
                <span style="font-size: 14px; color: #555;">Size (ဆိုဒ်): </span>
                <strong style="border: 1px solid #222; padding: 2px 8px; margin-left: 5px; border-radius: 4px;">M</strong>
                <span style="border: 1px solid #ddd; padding: 2px 8px; margin-left: 5px; border-radius: 4px; color: #aaa;">L</span>
                <span style="border: 1px solid #ddd; padding: 2px 8px; margin-left: 5px; border-radius: 4px; color: #aaa;">XL</span>
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

            <!-- 购买按钮（货到付款） -->
            <button onclick="orderCOD()" style="width: 100%; background: #222; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-bottom: 10px;">
                အိမ်ရောက်မှငွေချေမည် (货到付款)
            </button>

            <!-- 购买按钮（KPay转账） -->
            <button onclick="orderKPay()" style="width: 100%; background: #0066cc; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;">
                KBZPay ဖြင့်ငွေလွှဲမည် (KPay 转账)
            </button>
        </div>
    </div>

    <!-- 弹窗点击交互脚本 -->
    <script>
        function orderCOD() {
            alert("အော်ဒါတင်ရန်အတွက် ကျေးဇူးပြု၍ ဖုန်းနံပါတ်နှင့် လိပ်စာပေးပါ။\n(选择货到付款成功！请等待客服电话确认收货地址。)");
        }
        function orderKPay() {
            alert("KPay Account: 09123456789 သို့ 35,000 MMK လွှဲပေးပါ။\n(请向 KPay 账户 09123456789 转账 35,000 MMK 并保留截图。)");
        }
    </script>

</body>
</html>
